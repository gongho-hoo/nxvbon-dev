server:
  address: 0.0.0.0
  port: 18000
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: nxvibeon-spring-api
  profiles:
    default: local

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: DEBUG
    com.nxvibeon: DEBUG

nxvibeon:
  ai-worker:
    base-url: http://127.0.0.1:18001
    connect-timeout-ms: 3000
    read-timeout-ms: 600000
  prompt:
    general-chat: prompts/general-chat-prompt-ko.md
    project-chat: prompts/project-chat-prompt-ko.md
  chat-history:
    retention-months: 3
    cleanup-cron: "0 10 0 * * *"
